name: Bug report
description: The extension is not behaving correctly
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug.
    validations:
      required: true
  - type: textarea
    id: steps-to-reproduce
    attributes:
      label: Steps to reproduce
      description: The steps you took that caused the bug to occur. Please be as descriptive as possible.
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. Scroll down to '...'
        4. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: A clear and concise description of what you expected to happen.
    validations:
      required: true
  - type: input
    attributes:
      label: Extension version
      description: The version number of the Swift extension. You can find this information in [the VS Code Extensions view](https://code.visualstudio.com/docs/configure/extensions/extension-marketplace#_manage-extensions).
  - type: textarea
    attributes:
      label: Swift & OS version
      description: Paste the output of `swift --version ; uname -a` here.
